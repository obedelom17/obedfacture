<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObedFacture — Capture intelligente de factures</title>
<style>
  :root{
    --bg:#F4F5FB;
    --surface:#FFFFFF;
    --ink:#14162B;
    --ink-soft:#6B6F8A;
    --ink-faint:#A6AABD;
    --line:#E7E8F2;
    --primary:#6D5DFC;
    --primary-2:#9B6BFF;
    --primary-dark:#4F3FE0;
    --teal:#00C2A8;
    --coral:#FF6B57;
    --gold:#FFB020;
    --radius:14px;
    --radius-sm:9px;
    --shadow: 0 1px 2px rgba(20,22,43,0.04), 0 8px 24px rgba(20,22,43,0.06);
    --shadow-lg: 0 12px 40px rgba(109,93,252,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(900px 500px at 90% -10%, rgba(109,93,252,0.10), transparent 60%),
      radial-gradient(700px 500px at -10% 10%, rgba(0,194,168,0.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
    min-height:100vh;
  }
  .wrap{ max-width:1180px; margin:0 auto; padding:32px 22px 90px; }

  header.top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; gap:14px; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .logo{
    width:42px; height:42px; border-radius:12px; flex:none;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow-lg);
  }
  .logo svg{ width:22px; height:22px; }
  .brand h1{ margin:0; font-size:21px; font-weight:800; letter-spacing:-0.01em; }
  .brand .tag{ font-size:12.5px; color:var(--ink-soft); margin-top:1px; }

  .status-pill{
    display:flex; align-items:center; gap:7px; font-size:12px; color:var(--ink-soft);
    background:var(--surface); border:1px solid var(--line); border-radius:30px; padding:6px 13px 6px 10px;
    box-shadow: var(--shadow);
  }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--teal); flex:none; }
  .dot.live{ animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(0,194,168,0.5);} 50%{ box-shadow:0 0 0 5px rgba(0,194,168,0);} }
  .info-ico{ cursor:help; color:var(--ink-faint); font-size:13px; border:1px solid var(--line); border-radius:50%; width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; }

  .grid{ display:grid; grid-template-columns: 1.2fr 1fr; gap:20px; align-items:start; }
  @media (max-width: 880px){ .grid{ grid-template-columns: 1fr; } }

  .panel{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow: var(--shadow); overflow:hidden;
  }
  .panel h2{
    font-size:15px; margin:0; padding:16px 18px; font-weight:700;
    border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
  }
  .panel h2 .count{ font-size:12px; color:var(--ink-soft); font-weight:600; background:var(--bg); padding:3px 10px; border-radius:20px; }

  .dropzone{
    margin:16px; border:2px dashed #D6D3FB; border-radius:var(--radius); background:linear-gradient(180deg, rgba(109,93,252,0.04), transparent);
    padding:30px 14px; text-align:center; cursor:pointer; transition: 0.2s all;
  }
  .dropzone:hover, .dropzone.drag{ border-color:var(--primary); background:linear-gradient(180deg, rgba(109,93,252,0.08), transparent); transform: translateY(-1px); }
  .dropzone .icon{ font-size:28px; display:inline-block; margin-bottom:6px; transition: transform 0.2s; }
  .dropzone:hover .icon{ transform: translateY(-3px); }
  .dropzone .t1{ font-weight:700; font-size:14.5px; }
  .dropzone .t2{ font-size:12.5px; color:var(--ink-soft); margin-top:3px; }
  input[type=file]{ display:none; }

  .progress-wrap{ margin:0 16px 10px; display:none; }
  .progress-wrap.show{ display:block; }
  .progress-label{ font-size:12px; color:var(--ink-soft); margin-bottom:5px; display:flex; justify-content:space-between; }
  .progress-track{ height:6px; background:var(--bg); border-radius:6px; overflow:hidden; }
  .progress-fill{ height:100%; border-radius:6px; background:linear-gradient(90deg, var(--primary), var(--teal)); transition: width 0.4s ease; background-size:200% 100%; animation: shimmer 2s linear infinite; }
  @keyframes shimmer{ 0%{ background-position: 0% 0;} 100%{ background-position: 200% 0;} }

  .queue{ padding:0 16px 16px; display:flex; flex-direction:column; gap:8px; max-height:480px; overflow-y:auto; }
  .qitem{
    display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-left:3px solid var(--line);
    border-radius:11px; padding:10px 11px; cursor:pointer; background:var(--surface);
    transition: 0.15s all; animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(4px);} to{ opacity:1; transform:none; } }
  .qitem:hover{ box-shadow: var(--shadow); transform: translateY(-1px); }
  .qitem.active{ border-color:var(--primary); border-left-color:var(--primary); background:linear-gradient(90deg, rgba(109,93,252,0.05), transparent); }
  .qitem.s-waiting{ border-left-color:var(--ink-faint); }
  .qitem.s-extracting{ border-left-color:var(--gold); }
  .qitem.s-review{ border-left-color:var(--primary); }
  .qitem.s-validated{ border-left-color:var(--teal); }
  .qitem.s-error{ border-left-color:var(--coral); }
  .qthumb{
    width:36px; height:36px; border-radius:9px; background:var(--bg); flex:none;
    display:flex; align-items:center; justify-content:center; font-size:15px; overflow:hidden;
  }
  .qthumb img{ width:100%; height:100%; object-fit:cover; }
  .qmeta{ flex:1; min-width:0; }
  .qmeta .name{ font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .qmeta .sup{ font-size:11.5px; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .qstatus{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:3px 8px; border-radius:20px; flex:none; }
  .st-waiting{ background:#EEEEF6; color:var(--ink-soft); }
  .st-extracting{ background:#FFF3DD; color:#9A6B00; }
  .st-review{ background:#EDE9FF; color:var(--primary-dark); }
  .st-validated{ background:#DEF7F1; color:#0A8F76; }
  .st-error{ background:#FFE7E2; color:#C53D28; }

  .empty{ padding:36px 16px; text-align:center; color:var(--ink-faint); font-size:13px; }

  .detail{ padding:18px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); margin-bottom:5px; }
  .field input{
    width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:var(--radius-sm);
    font-size:14px; font-family: inherit; background:var(--bg); color:var(--ink); transition: 0.15s border-color, 0.15s background;
  }
  .field input:focus{ outline:none; border-color:var(--primary); background:var(--surface); }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .mono input{ font-family: ui-monospace, "SF Mono", Consolas, monospace; }

  .acct-wrap{ position:relative; }
  .acct-list{
    position:absolute; z-index:5; top:calc(100% + 4px); left:0; right:0;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    max-height:220px; overflow-y:auto; box-shadow: var(--shadow-lg); display:none;
  }
  .acct-list.open{ display:block; }
  .acct-opt{ padding:8px 11px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--bg); }
  .acct-opt:hover{ background:var(--bg); }
  .acct-opt .code{ font-family: ui-monospace, monospace; color:var(--primary-dark); margin-right:8px; font-weight:700; }

  .actions{ display:flex; gap:8px; padding:14px 16px; border-top:1px solid var(--line); flex-wrap:wrap; }
  button{ font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-size:13.5px; font-weight:700; padding:10px 16px; transition: 0.15s transform, 0.15s box-shadow, 0.15s background; }
  button:active{ transform: scale(0.97); }
  .btn-primary{ background: linear-gradient(135deg, var(--primary), var(--primary-2)); color:#fff; box-shadow: var(--shadow-lg); }
  .btn-primary:hover{ filter:brightness(1.06); }
  .btn-primary:disabled{ background:#D9D7EE; color:#fff; cursor:not-allowed; box-shadow:none; }
  .btn-bulk{ background:#fff; color:var(--teal); border:1.5px solid var(--teal); }
  .btn-bulk:hover{ background:#EAFBF7; }
  .btn-bulk:disabled{ color:var(--ink-faint); border-color:var(--line); cursor:not-allowed; }
  .btn-ghost{ background:transparent; color:var(--ink-soft); border:1.5px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--ink-soft); color:var(--ink); }
  .btn-export{ background:var(--ink); color:#fff; }
  .btn-export:hover{ background:#000; }

  .stamp-fx{
    position:fixed; pointer-events:none; z-index:50;
    border:5px solid var(--teal); color:var(--teal); border-radius:50%;
    width:130px; height:130px; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:18px; letter-spacing:1.5px;
    transform: scale(2.4) rotate(-14deg); opacity:0;
    top:50%; left:50%; margin:-65px 0 0 -65px;
    animation: stampIn 0.5s cubic-bezier(.2,1.4,.4,1) forwards;
    box-shadow: 0 0 40px rgba(0,194,168,0.25);
  }
  @keyframes stampIn{
    0%{ transform: scale(2.4) rotate(-14deg); opacity:0; }
    55%{ transform: scale(0.94) rotate(-14deg); opacity:0.95; }
    75%{ transform: scale(1.04) rotate(-14deg); opacity:0.9;}
    100%{ transform: scale(1) rotate(-14deg); opacity:0; }
  }

  .toast-wrap{ position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:60; }
  .toast{
    background:var(--ink); color:#fff; padding:11px 16px; border-radius:10px; font-size:13px; font-weight:600;
    box-shadow: var(--shadow-lg); animation: toastIn 0.25s ease, toastOut 0.3s ease 2.7s forwards;
    display:flex; align-items:center; gap:8px;
  }
  .toast.ok{ background: linear-gradient(135deg, #0A8F76, var(--teal)); }
  .toast.err{ background: linear-gradient(135deg, #C53D28, var(--coral)); }
  @keyframes toastIn{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform:none;} }
  @keyframes toastOut{ to{ opacity:0; transform: translateY(8px);} }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 3h9l3 3v15H6V3z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M9 9h6M9 12.5h6M9 16h3.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="17.2" cy="17.2" r="3.6" fill="#00C2A8" stroke="white" stroke-width="1"/>
          <path d="M15.6 17.2l1 1 2-2.1" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1>ObedFacture</h1>
        <div class="tag">Factures → comptes SYSCOHADA → Sage, automatiquement</div>
      </div>
    </div>
    <div class="status-pill">
      <span class="dot live"></span> IA prête
      <span class="info-ico" title="Cle Gemini securisee cote serveur. Niveau gratuit Google : le contenu peut etre utilise pour ameliorer leurs modeles. Donnees gardees dans ce navigateur uniquement.">i</span>
    </div>
  </header>

  <div class="grid">
    <div class="panel">
      <h2>Boîte de réception <span class="count" id="queueCount">0</span></h2>
      <div class="dropzone" id="dropzone">
        <span class="icon">⤓</span>
        <div class="t1">Glissez vos factures ici</div>
        <div class="t2">Photos ou PDF · plusieurs à la fois</div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,application/pdf" multiple>
      </div>
      <div class="progress-wrap" id="progressBar">
        <div class="progress-label"><span>Traitement <b id="progDone">0</b>/<b id="progTotal">0</b></span><span id="progEta">—</span></div>
        <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
      </div>
      <div class="queue" id="queue">
        <div class="empty">Aucune facture pour l'instant.</div>
      </div>
      <div class="actions">
        <button class="btn-bulk" id="bulkBtn" disabled>⚡ Valider tout</button>
        <button class="btn-export" id="exportBtn" disabled>Exporter pour Sage</button>
        <button class="btn-ghost" id="clearBtn">Vider</button>
      </div>
    </div>

    <div class="panel">
      <h2 id="detailTitle">Détail</h2>
      <div class="detail" id="detailBody">
        <div class="empty">Sélectionnez une facture pour la vérifier.</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

const MIN_DELAY_MS = 4500;
let processingChain = Promise.resolve();
let batchTotal = 0;

function sleep(ms){ return new Promise(r=> setTimeout(r, ms)); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function lsGet(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
function lsSet(key, val){ try{ localStorage.setItem(key, val); return true; }catch(e){ return false; } }

function toast(msg, kind){
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' '+kind : '');
  el.textContent = msg;
  toastWrap.appendChild(el);
  setTimeout(()=> el.remove(), 3000);
}

function updateProgress(){
  const remaining = batchTotal - batchDone;
  if(remaining <= 0){ progressBar.classList.remove('show'); batchTotal = 0; batchDone = 0; return; }
  progressBar.classList.add('show');
  progDone.textContent = batchDone;
  progTotal.textContent = batchTotal;
  progFill.style.width = Math.round((batchDone/batchTotal)*100) + '%';
  const secs = remaining * (MIN_DELAY_MS/1000);
  progEta.textContent = secs < 60 ? Math.ceil(secs)+' s' : Math.ceil(secs/60)+' min';
}

function loadAll(){
  try{ const mem = lsGet('supplier_memory'); if(mem) supplierMemory = JSON.parse(mem); }catch(e){ supplierMemory = {}; }
  try{
    const saved = lsGet('validated_entries');
    if(saved){ const arr = JSON.parse(saved); queue = arr.concat(queue); renderQueue(); updateTotals(); }
  }catch(e){}
}
function saveMemory(){ lsSet('supplier_memory', JSON.stringify(supplierMemory)); }
function saveValidated(){ lsSet('validated_entries', JSON.stringify(queue.filter(q=>q.status==='validated'))); }

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
dropzone.addEventListener('click', ()=> fileInput.click());
['dragover','dragenter'].forEach(ev=> dropzone.addEventListener(ev, e=>{ e.preventDefault(); dropzone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev=> dropzone.addEventListener(ev, e=>{ e.preventDefault(); dropzone.classList.remove('drag'); }));
dropzone.addEventListener('drop', e=>{ handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e=>{ handleFiles(e.target.files); fileInput.value=''; });

function handleFiles(files){
  const list = Array.from(files);
  if(list.length===0) return;
  batchTotal += list.length;
  updateProgress();
  for(const f of list){ queueFile(f); }
}

async function queueFile(file){
  const id = 'f' + (nextId++);
  const isPdf = file.type === 'application/pdf';
  const item = {
    id, filename: file.name, mediaType: file.type || (isPdf? 'application/pdf':'image/jpeg'),
    isPdf, dataUrl: null, base64: null, status: 'waiting', extracted: null, error: null
  };
  queue.unshift(item);
  renderQueue();
  if(!isPdf){
    item.dataUrl = await new Promise(res=>{ const r = new FileReader(); r.onload = ()=> res(r.result); r.readAsDataURL(file); });
    renderQueue();
  }
  item.base64 = await fileToBase64(file);
  processingChain = processingChain.then(()=> processItem(item));
}

async function processItem(item){
  item.status = 'extracting';
  renderQueue();
  if(activeId===null) selectItem(item.id);

  let attempt = 0, lastErrMsg = '';
  while(attempt < 4){
    try{ await extractInvoice(item); lastErrMsg = ''; break; }
    catch(e){
      lastErrMsg = (e && e.message) ? e.message : 'erreur inconnue';
      const low = lastErrMsg.toLowerCase();
      const isRateLimit = low.includes('429') || low.includes('resource_exhausted') || low.includes('quota') || low.includes('rate');
      attempt++;
      if(isRateLimit && attempt < 4){ await sleep(9000 * attempt); continue; }
      break;
    }
  }
  if(lastErrMsg){
    item.status = 'error';
    item.error = (lastErrMsg.toLowerCase().includes('quota') || lastErrMsg.includes('429'))
      ? 'Limite IA atteinte. Reessayez cette facture plus tard.'
      : ('Lecture impossible (' + lastErrMsg + ').');
    item.extracted = { fournisseur:'', date:'', numero_facture:'', description:'', montant_ht:0, montant_tva:0, montant_ttc:0, compte_code:'', compte_libelle:'' };
  }
  batchDone++;
  updateProgress();
  renderQueue();
  updateTotals();
  if(activeId === item.id) selectItem(item.id);
  await sleep(MIN_DELAY_MS);
}

function retryItem(id){
  const item = queue.find(q=>q.id===id);
  if(!item) return;
  item.error = null;
  batchTotal++;
  updateProgress();
  processingChain = processingChain.then(()=> processItem(item));
}

async function extractInvoice(item){
  const candidates = SUGGEST_ACCOUNTS.map(a=> a[0]+' : '+a[1]).join('\n');
  const promptText = "Tu es un assistant comptable specialise SYSCOHADA (zone OHADA, Afrique de l'Ouest/Centrale). " +
    "On te montre une facture (photo ou PDF). Extrais les informations et reponds UNIQUEMENT avec un objet JSON valide, sans texte autour, sans balises markdown. " +
    "Format exact attendu: {\"fournisseur\":string,\"date\":string (format YYYY-MM-DD ou vide si illisible),\"numero_facture\":string (numero ou reference de la facture visible sur le document, vide si absent),\"description\":string (court, 5-8 mots),\"montant_ht\":number,\"montant_tva\":number,\"montant_ttc\":number,\"compte_code\":string,\"compte_libelle\":string,\"confiance\":\"haute\"|\"moyenne\"|\"basse\"}. " +
    "Pour compte_code, choisis le code le plus pertinent UNIQUEMENT dans cette liste de comptes SYSCOHADA (charges, immobilisations, tiers) :\n" + candidates +
    "\nSi aucun montant TVA n'est visible, mets 0. Si le HT n'est pas indique mais le TTC oui, estime le HT en supposant 18% de TVA sauf indication contraire visible sur la facture. Les montants sont en Francs CFA, donne des nombres simples sans espace ni symbole.";

  const parts = [
    { text: promptText },
    { inline_data: { mime_type: item.isPdf ? 'application/pdf' : item.mediaType, data: item.base64 } }
  ];

  const resp = await fetch('/api/extract', {
    method:'POST', headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ parts })
  });
  const data = await resp.json();
  if(resp.status === 429){ throw new Error('429 quota depasse: ' + (data.error && data.error.message ? data.error.message : 'limite atteinte')); }
  if(data.error){ throw new Error((data.error.code ? data.error.code+' ' : '') + (data.error.message || 'Erreur serveur')); }
  const cand = data.candidates && data.candidates[0];
  const textPart = cand && cand.content && cand.content.parts && cand.content.parts.find(p=>p.text);
  if(!textPart) throw new Error("Reponse vide de l'IA");
  let clean = textPart.text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  const parsed = JSON.parse(clean);

  const normSup = (parsed.fournisseur||'').trim().toLowerCase();
  if(normSup && supplierMemory[normSup]){
    parsed.compte_code = supplierMemory[normSup].code;
    parsed.compte_libelle = supplierMemory[normSup].libelle;
    parsed._memoire = true;
  }
  item.extracted = parsed;
  item.status = 'review';
}

    queueEl.innerHTML = '<div class="empty">Aucune facture pour l\'instant.</div>';

  let reviewCount = 0;
  queue.forEach(item=>{
    if(item.status==='review') reviewCount++;
    const div = document.createElement('div');
    div.className = 'qitem s-'+item.status + (item.id===activeId ? ' active':'');
    const thumb = item.dataUrl ? '<img src="'+item.dataUrl+'">' : '📄';
    const supName = item.extracted && item.extracted.fournisseur ? item.extracted.fournisseur : (item.status==='extracting' ? 'Lecture…' : (item.status==='waiting' ? 'En attente…' : '—'));
    const stMap = { waiting:'En attente', extracting:'Lecture', review:'A verifier', validated:'Validee', error:'Erreur' };
    div.innerHTML =
      '<div class="qthumb">'+thumb+'</div>' +
      '<div class="qmeta"><div class="name">'+escapeHtml(item.filename)+'</div><div class="sup">'+escapeHtml(supName)+'</div></div>' +
      '<div class="qstatus st-'+item.status+'">'+(stMap[item.status]||item.status)+'</div>';
    div.addEventListener('click', ()=> selectItem(item.id));
    queueEl.appendChild(div);
  });
  bulkBtn.disabled = reviewCount === 0;
  bulkBtn.textContent = reviewCount > 0 ? ('⚡ Valider tout ('+reviewCount+')') : '⚡ Valider tout';
}

function selectItem(id){
  activeId = id;
  renderQueue();
  const item = queue.find(q=>q.id===id);
  if(!item) return;
  detailTitle.innerHTML = 'Détail <span class="count">'+escapeHtml(item.filename)+'</span>';
  if(item.status==='extracting' || item.status==='waiting'){
    detailBody.innerHTML = '<div class="empty">'+(item.status==='waiting' ? 'En attente dans la file…' : 'Lecture automatique en cours…')+'</div>';
    return;
  }
  const ex = item.extracted || { fournisseur:'', date:'', numero_facture:'', description:'', montant_ht:0, montant_tva:0, montant_ttc:0, compte_code:'', compte_libelle:'' };
  const readonly = item.status==='validated';
  detailBody.innerHTML =
    (item.error ? '<div class="qstatus st-error" style="display:inline-block;margin-bottom:10px;">'+escapeHtml(item.error)+'</div>' : '') +
    field('Fournisseur','d_fournisseur', ex.fournisseur, readonly) +
    '<div class="row2">' + field('Date','d_date', ex.date, readonly, true) + field('N° Facture','d_numfact', ex.numero_facture, readonly, true) + '</div>' +
    '<div class="row2">' + field('Montant HT','d_ht', ex.montant_ht, readonly, true) + field('TVA','d_tva', ex.montant_tva, readonly, true) + '</div>' +
    field('TTC (F CFA)','d_ttc', ex.montant_ttc, readonly, true) +
    field('Description','d_desc', ex.description, readonly) +
    '<div class="field"><label>Compte SYSCOHADA</label><div class="acct-wrap">' +
      '<input id="d_compte" '+(readonly?'disabled':'')+' value="'+escapeHtml((ex.compte_code||'')+(ex.compte_libelle ? ' — '+ex.compte_libelle : ''))+'" placeholder="Chercher un compte" autocomplete="off">' +
      '<div class="acct-list" id="acctList"></div>' +
    '</div></div>' +
    (readonly
      ? '<div class="actions" style="padding:6px 0 0;"><button class="btn-ghost" id="btnUnvalidate">Modifier à nouveau</button></div>'
      : ('<div class="actions" style="padding:6px 0 0;"><button class="btn-primary" id="btnValidate">Valider</button>' +
         (item.status==='error' ? '<button class="btn-ghost" id="btnRetry">Réessayer</button>' : '') +
         '<button class="btn-ghost" id="btnDelete">Supprimer</button></div>'));

  if(!readonly){
    const acctInput = document.getElementById('d_compte');
    const acctList = document.getElementById('acctList');
    acctInput.dataset.code = ex.compte_code||'';
    acctInput.addEventListener('focus', ()=> showAcctOptions(acctInput.value));
    acctInput.addEventListener('input', ()=> showAcctOptions(acctInput.value));
    document.addEventListener('click', (e)=>{ if(!e.target.closest('.acct-wrap')) acctList.classList.remove('open'); });
    document.getElementById('btnValidate').addEventListener('click', ()=> validateItem(item.id));
    const retryBtn = document.getElementById('btnRetry');
    if(retryBtn) retryBtn.addEventListener('click', ()=> retryItem(item.id));
    document.getElementById('btnDelete').addEventListener('click', ()=> deleteItem(item.id));
  } else {
    document.getElementById('btnUnvalidate').addEventListener('click', ()=>{ item.status='review'; saveValidated(); selectItem(item.id); renderQueue(); updateTotals(); });
  }
}

function field(label,id,value,readonly,mono){
  return '<div class="field'+(mono?' mono':'')+'"><label>'+label+'</label><input id="'+id+'" value="'+escapeHtml(String(value===undefined||value===null?'':value))+'" '+(readonly?'disabled':'')+'></div>';
}

function showAcctOptions(query){
  const acctList = document.getElementById('acctList');
  const q = (query||'').toLowerCase();
  let matches = !q ? FULL_ACCOUNTS.slice(0,30) : FULL_ACCOUNTS.filter(a=> a[0].includes(q) || a[1].toLowerCase().includes(q)).slice(0,30);
  acctList.innerHTML = matches.length===0 ? '<div class="acct-opt">Aucun résultat</div>' :
    matches.map(a=> '<div class="acct-opt" data-code="'+a[0]+'" data-lib="'+escapeHtml(a[1])+'"><span class="code">'+a[0]+'</span>'+escapeHtml(a[1])+'</div>').join('');
  acctList.querySelectorAll('.acct-opt[data-code]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const input = document.getElementById('d_compte');
      input.value = el.dataset.code + ' — ' + el.dataset.lib;
      input.dataset.code = el.dataset.code;
      input.dataset.lib = el.dataset.lib;
      acctList.classList.remove('open');
    });
  });
  acctList.classList.add('open');
}

function commitValidation(item, fieldsOverride){
  const f = fieldsOverride || item.extracted;
  item.extracted = {
    fournisseur: (f.fournisseur||'').trim(),
    date: (f.date||'').trim(),
    numero_facture: (f.numero_facture||'').trim(),
    description: (f.description||'').trim(),
    montant_ht: Number(f.montant_ht)||0,
    montant_tva: Number(f.montant_tva)||0,
    montant_ttc: Number(f.montant_ttc)||0,
    compte_code: f.compte_code || '', compte_libelle: f.compte_libelle || ''
  };
  item.status = 'validated';
  const normSup = item.extracted.fournisseur.toLowerCase();
  if(normSup && item.extracted.compte_code){ supplierMemory[normSup] = { code: item.extracted.compte_code, libelle: item.extracted.compte_libelle }; }
}

function validateItem(id){
  const item = queue.find(q=>q.id===id);
  if(!item) return;
  const acctInput = document.getElementById('d_compte');
  let code = acctInput.dataset.code, lib = acctInput.dataset.lib;
  if(!code){
    const raw = acctInput.value.split('—')[0].trim();
    const found = FULL_ACCOUNTS.find(a=>a[0]===raw);
    if(found){ code = found[0]; lib = found[1]; }
  }
  commitValidation(item, {
    fournisseur: document.getElementById('d_fournisseur').value,
    date: document.getElementById('d_date').value,
    numero_facture: document.getElementById('d_numfact').value,
    description: document.getElementById('d_desc').value,
    montant_ht: document.getElementById('d_ht').value,
    montant_tva: document.getElementById('d_tva').value,
    montant_ttc: document.getElementById('d_ttc').value,
    compte_code: code, compte_libelle: lib
  });
  saveMemory();
  saveValidated();
  renderQueue();
  updateTotals();
  selectItem(id);
  showStamp('OK');
}

bulkBtn.addEventListener('click', ()=>{
  const toValidate = queue.filter(q=>q.status==='review');
  if(toValidate.length===0) return;
  if(!confirm('Valider '+toValidate.length+' facture(s) sans vérification manuelle, avec les informations lues automatiquement ?')) return;
  toValidate.forEach(item=> commitValidation(item));
  saveMemory();
  saveValidated();
  renderQueue();
  updateTotals();
  toast(toValidate.length+' facture(s) validée(s) automatiquement', 'ok');
  showStamp(toValidate.length + ' ✓');
});

function deleteItem(id){
  queue = queue.filter(q=>q.id!==id);
  activeId = null;
  renderQueue();
  updateTotals();
  detailBody.innerHTML = '<div class="empty">Sélectionnez une facture.</div>';
  detailTitle.textContent = 'Détail';
  saveValidated();
}

function showStamp(text){
  const el = document.createElement('div');
  el.className = 'stamp-fx';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=> el.remove(), 600);
}

function updateTotals(){
  const validated = queue.filter(q=>q.status==='validated');
  exportBtn.disabled = validated.length===0;
}

function isoToJjMmAaaa(iso){
  if(!iso) return '';
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[3]+'/'+m[2]+'/'+m[1];
  return iso;
}
function moneyComma(n){ return (Number(n)||0).toFixed(2).replace('.', ','); }
function toLatin1Bytes(str){
  const bytes = [];
  for(let i=0;i<str.length;i++){
    let code = str.charCodeAt(i);
    if(code > 255) code = 63; // '?' de secours pour les caracteres hors Latin-1
    bytes.push(code);
  }
  return new Uint8Array(bytes);
}

// Structure calquee sur "Exemple ecritures Cegid.txt" (modele officiel Sage) :
// Jal | Date | N° | General | Auxiliaire | Reference | Debit | Credit | Date echeance | Libelle | Mode de paiement | (vide)
const SAGE_HEADER = "Jal\tDate\tN°\tGénéral\tAuxiliaire\tRéférence\tDébit\tCrédit\tDate échéance\tLibellé\tMode de paiement\t";

function sageLine(jal, date, numPiece, compteGeneral, auxiliaire, reference, debit, credit, dateEcheance, libelle, modePaiement){
  return [jal, date, numPiece, compteGeneral, auxiliaire, reference, debit, credit, dateEcheance, libelle, modePaiement, ''].join('\t');
}

exportBtn.addEventListener('click', ()=>{
  const validated = queue.filter(q=>q.status==='validated');
  if(validated.length===0) return;
  const lines = [SAGE_HEADER];
  validated.forEach(q=>{
    const e = q.extracted;
    const d = isoToJjMmAaaa(e.date);
    const numFact = e.numero_facture || '';
    const fourn = e.fournisseur || '';
    const libelle = 'Fact. fourn.  ' + fourn + (e.description ? ' - '+e.description : '');

    if(e.montant_ht){
      lines.push(sageLine('ACH', d, numFact, e.compte_code||'', '', numFact, moneyComma(e.montant_ht), '0,00', '', libelle, ''));
    }
    if(e.montant_tva){
      lines.push(sageLine('ACH', d, numFact, '4452', '', numFact, moneyComma(e.montant_tva), '0,00', '', libelle, ''));
    }
    lines.push(sageLine('ACH', d, numFact, '401', '', numFact, '0,00', moneyComma(e.montant_ttc||0), d, libelle, ''));
  });
  const text = lines.join('\r\n') + '\r\n';
  const bytes = toLatin1Bytes(text);
  const blob = new Blob([bytes], { type:'text/plain;charset=windows-1252;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'export_factures_sage.txt';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Export genere : export_factures_sage.txt', 'ok');
});

clearBtn.addEventListener('click', ()=>{
  if(!confirm('Vider tout le registre (factures non exportées seront perdues) ?')) return;
  queue = [];
  activeId = null;
  renderQueue();
  updateTotals();
  detailBody.innerHTML = '<div class="empty">Sélectionnez une facture.</div>';
  detailTitle.textContent = 'Détail';
  saveValidated();
});

loadAll();
renderQueue();
updateTotals();
</script>
